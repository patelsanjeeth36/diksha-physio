# Application
spring.application.name=diksha-physio
server.port=${PORT:8080}

# PostgreSQL (production - use env vars on Render.com)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Resend API — for callback notification emails (works on Render free tier)
# Gmail SMTP is blocked on Render — Resend uses HTTPS so it works
resend.api.key=${RESEND_API_KEY:}

# Email to notify when a callback is received
notification.email=${NOTIFICATION_EMAIL:diksha.physio.care@gmail.com}
